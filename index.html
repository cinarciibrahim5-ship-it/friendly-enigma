<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProGamerx26 | Oyun Hediyeleri</title>
    <style>
        body { background: #0a0a0c; color: #fff; font-family: sans-serif; text-align: center; margin: 0; }
        .card { background: #1c1c21; margin: 20px auto; padding: 20px; border-radius: 15px; border: 1px solid #00f2ff; max-width: 400px; }
        .taktik-kutusu { background: #222; padding: 15px; border-radius: 10px; margin-top: 15px; display: none; text-align: left; border-left: 5px solid #00f2ff; }
        .btn { background: #00f2ff; color: #000; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; border: none; }
        h2 { color: #00f2ff; margin: 0; }
    </style>
    <script>
        function taktikGoster(id) {
            document.getElementById(id).style.display = 'block';
            alert("Tebrikler! Taktiği aşağıda görebilirsin.");
        }
    </script>
</head>
<body>
    <h1 style="margin-top:20px;">PRO GAMER X 26</h1>
    <p>Oyun Hediyeleri ve Gizli Kodlar</p>

    <div class="card">
        <h2>Brawl Stars</h2>
        <p>Ücretsiz Elmas ve Kutu Taktiği</p>
        <button onclick="taktikGoster('bs-taktik')" class="btn">TAKTİĞİ GÖR</button>
        <div id="bs-taktik" class="taktik-kutusu">
            <b>🔥 Elmas Taktiği:</b> Mağaza - İçerik Üreticisi kısmına <b>PRO26</b> yazarak 30 Elmas bonusunuzu aktif edin.
        </div>
    </div>

    <div class="card">
        <h2>PUBG Mobile</h2>
        <p>Yeni Sezon UC Hediye Kodu</p>
        <button onclick="taktikGoster('pubg-taktik')" class="btn">UC KODUNU AL</button>
        <div id="pubg-taktik" class="taktik-kutusu">
            <b>🔥 UC Kodu:</b> <span style="color:#ff9900">PUBG-X26-2026</span><br>(Midasbuy sitesinde deneyin.)
        </div>
    </div>
</body>
</html>
